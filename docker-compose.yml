services:
  bookings:
    build: .
    image: innospace-bookings
    container_name: innospace-bookings
    restart: unless-stopped
    ports:
      - "4000:4000"
    # Reads RESEND_API_KEY, DASHBOARD_PASSWORD, AUTH_SECRET, etc. from .env
    env_file:
      - .env
    volumes:
      # Persist the JSON "database" outside the container.
      - bookings-data:/app/data

volumes:
  bookings-data:
